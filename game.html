<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Викторина: Irregular Verbs | English Grammar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #eef2f5;   /* нейтральный фон */
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* карточка викторины */
        .quiz-card {
            max-width: 620px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* шапка с темой и счётчиком */
        .quiz-header {
            background: #f9fafb;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #e4e9f0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .title-section h1 {
            font-size: 1.65rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1e2f3e;
        }

        .title-section p {
            font-size: 0.85rem;
            color: #5b6f82;
            margin-top: 4px;
        }

        .score-box {
            background: #eef2fa;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            text-align: center;
            min-width: 110px;
        }

        .score-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #2c4c6e;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: #1a4c7a;
        }

        .score-max {
            font-size: 0.9rem;
            font-weight: 500;
            color: #6c7e91;
        }

        /* основная зона вопроса */
        .question-area {
            padding: 2rem 2rem 1.8rem;
        }

        .infinitive-box {
            background: #f1f4f8;
            border-radius: 2rem;
            text-align: center;
            padding: 1.2rem 1rem;
            margin-bottom: 2rem;
            border: 1px solid #e6edf4;
        }

        .infinitive-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #4f6f8f;
            letter-spacing: 1px;
        }

        .infinitive-word {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0a2b3e;
            margin-top: 8px;
            word-break: break-word;
        }

        /* поля ввода */
        .input-group {
            margin-bottom: 1.4rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c4f6e;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            background: #ffffff;
            border: 1.5px solid #dfe7ef;
            border-radius: 1.5rem;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
            color: #1a2f3f;
        }

        .input-group input:focus {
            border-color: #7f9cbb;
            box-shadow: 0 0 0 3px rgba(79, 111, 143, 0.2);
        }

        /* фидбек-сообщение */
        .feedback-message {
            margin: 1rem 0 1.2rem;
            padding: 0.8rem 1rem;
            border-radius: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.2s;
            background: #f8fafc;
            color: #4b5e70;
        }

        .feedback-green {
            background: #e3f7ec;
            color: #1f7840;
            border-left: 4px solid #2b9348;
        }

        .feedback-red {
            background: #ffeae9;
            color: #bc3f33;
            border-left: 4px solid #d63e2e;
        }

        /* кнопки */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 0.85rem 0;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.2s;
            background: #eef2f7;
            color: #2c4c6e;
            font-family: inherit;
        }

        .btn-check {
            background: #2c6e46;
            color: white;
            box-shadow: 0 2px 6px rgba(44, 110, 70, 0.2);
        }

        .btn-check:hover {
            background: #1e5737;
            transform: scale(0.98);
        }

        .btn-next {
            background: #2c4f6e;
            color: white;
        }

        .btn-next:hover {
            background: #1f3e57;
            transform: scale(0.98);
        }

        .btn-reset {
            background: #eef2f7;
            color: #4e6b85;
            border: 1px solid #cfdde9;
        }

        .btn-reset:hover {
            background: #e2e8f0;
        }

        /* прогресс / счётчик вопросов */
        .progress-indicator {
            background: #f9fbfd;
            padding: 0.8rem 2rem;
            border-top: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #4d6a85;
            font-weight: 500;
        }

        /* адаптивность */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .quiz-header {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.2rem 1.5rem;
            }
            .question-area {
                padding: 1.5rem;
            }
            .infinitive-word {
                font-size: 1.9rem;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                padding: 0.75rem;
            }
            .score-box {
                align-self: flex-start;
            }
        }

        /* для очень маленьких экранов */
        @media (max-width: 400px) {
            .infinitive-word {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="quiz-card" id="quizApp">
    <div class="quiz-header">
        <div class="title-section">
            <h1>📖 Irregular Verbs</h1>
            <p>Past Simple & Past Participle</p>
        </div>
        <div class="score-box">
            <div class="score-label">✓ correct answers</div>
            <div><span class="score-value" id="scoreCount">0</span> <span class="score-max">/ <span id="totalQuestions">0</span></span></div>
        </div>
    </div>

    <div class="question-area">
        <div class="infinitive-box">
            <div class="infinitive-label">INFINITIVE</div>
            <div class="infinitive-word" id="infinitiveDisplay">—</div>
        </div>

        <div class="input-group">
            <label>🔹 Past Simple (V2)</label>
            <input type="text" id="pastSimpleInput" placeholder="e.g. went, ate, began" autocomplete="off">
        </div>

        <div class="input-group">
            <label>🔸 Past Participle (V3)</label>
            <input type="text" id="pastParticipleInput" placeholder="e.g. gone, eaten, begun" autocomplete="off">
        </div>

        <div id="feedbackArea" class="feedback-message">
            ✨ Введите формы глагола и нажмите «Check»
        </div>

        <div class="button-group">
            <button class="btn btn-check" id="checkBtn">✅ Check</button>
            <button class="btn btn-next" id="nextBtn">➡ Next verb</button>
            <button class="btn btn-reset" id="resetBtn">🔄 Reset quiz</button>
        </div>
    </div>
    <div class="progress-indicator">
        <span>📌 вопрос <span id="currentIndexDisplay">1</span> из <span id="totalCountDisplay">0</span></span>
        <span>⭐ правильные: <span id="scoreInline">0</span></span>
    </div>
</div>

<script>
    // ----- БАЗА НЕПРАВИЛЬНЫХ ГЛАГОЛОВ -----
    const VERBS_LIST = [
        { infinitive: "be",    past: "was/were", participle: "been" },
        { infinitive: "become", past: "became", participle: "become" },
        { infinitive: "begin", past: "began", participle: "begun" },
        { infinitive: "break", past: "broke", participle: "broken" },
        { infinitive: "bring", past: "brought", participle: "brought" },
        { infinitive: "build", past: "built", participle: "built" },
        { infinitive: "buy", past: "bought", participle: "bought" },
        { infinitive: "catch", past: "caught", participle: "caught" },
        { infinitive: "choose", past: "chose", participle: "chosen" },
        { infinitive: "come", past: "came", participle: "come" },
        { infinitive: "cost", past: "cost", participle: "cost" },
        { infinitive: "cut", past: "cut", participle: "cut" },
        { infinitive: "do", past: "did", participle: "done" },
        { infinitive: "drink", past: "drank", participle: "drunk" },
        { infinitive: "drive", past: "drove", participle: "driven" },
        { infinitive: "eat", past: "ate", participle: "eaten" },
        { infinitive: "fall", past: "fell", participle: "fallen" },
        { infinitive: "feel", past: "felt", participle: "felt" },
        { infinitive: "find", past: "found", participle: "found" },
        { infinitive: "fly", past: "flew", participle: "flown" },
        { infinitive: "forget", past: "forgot", participle: "forgotten" },
        { infinitive: "get", past: "got", participle: "got/gotten" },
        { infinitive: "give", past: "gave", participle: "given" },
        { infinitive: "go", past: "went", participle: "gone" },
        { infinitive: "grow", past: "grew", participle: "grown" },
        { infinitive: "have", past: "had", participle: "had" },
        { infinitive: "hear", past: "heard", participle: "heard" },
        { infinitive: "keep", past: "kept", participle: "kept" },
        { infinitive: "know", past: "knew", participle: "known" },
        { infinitive: "leave", past: "left", participle: "left" },
        { infinitive: "lose", past: "lost", participle: "lost" },
        { infinitive: "make", past: "made", participle: "made" },
        { infinitive: "meet", past: "met", participle: "met" },
        { infinitive: "pay", past: "paid", participle: "paid" },
        { infinitive: "read", past: "read", participle: "read" },
        { infinitive: "ride", past: "rode", participle: "ridden" },
        { infinitive: "ring", past: "rang", participle: "rung" },
        { infinitive: "run", past: "ran", participle: "run" },
        { infinitive: "say", past: "said", participle: "said" },
        { infinitive: "see", past: "saw", participle: "seen" },
        { infinitive: "sell", past: "sold", participle: "sold" },
        { infinitive: "sing", past: "sang", participle: "sung" },
        { infinitive: "sit", past: "sat", participle: "sat" },
        { infinitive: "sleep", past: "slept", participle: "slept" },
        { infinitive: "speak", past: "spoke", participle: "spoken" },
        { infinitive: "swim", past: "swam", participle: "swum" },
        { infinitive: "take", past: "took", participle: "taken" },
        { infinitive: "teach", past: "taught", participle: "taught" },
        { infinitive: "tell", past: "told", participle: "told" },
        { infinitive: "think", past: "thought", participle: "thought" },
        { infinitive: "understand", past: "understood", participle: "understood" },
        { infinitive: "wear", past: "wore", participle: "worn" },
        { infinitive: "win", past: "won", participle: "won" },
        { infinitive: "write", past: "wrote", participle: "written" }
    ];

    // ---------- СОСТОЯНИЕ ВИКТОРИНЫ ----------
    let currentVerbIndex = 0;               // индекс текущего глагола
    let userScore = 0;                      // сколько правильных ответов дано за всю сессию (НЕ сброс при смене вопроса)
    let isCurrentVerbAnswered = false;      // флаг: отвечен ли текущий глагол правильно (чтобы нельзя было накрутить счёт)
    let currentVerbData = null;              // объект { infinitive, past, participle }
    
    // Элементы DOM
    const infinitiveDisplay = document.getElementById('infinitiveDisplay');
    const pastSimpleInput = document.getElementById('pastSimpleInput');
    const pastParticipleInput = document.getElementById('pastParticipleInput');
    const feedbackArea = document.getElementById('feedbackArea');
    const scoreCountSpan = document.getElementById('scoreCount');
    const totalQuestionsSpan = document.getElementById('totalQuestions');
    const currentIndexDisplay = document.getElementById('currentIndexDisplay');
    const totalCountDisplay = document.getElementById('totalCountDisplay');
    const scoreInline = document.getElementById('scoreInline');
    const checkBtn = document.getElementById('checkBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Вспомогательная функция: нормализация строки для сравнения (без учёта регистра, trim, замена слэшей/вариантов)
    function normalizeAnswer(str) {
        if (!str) return '';
        return str.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[\/,]/g, ' ').replace(/\s+/g, ' ').trim();
    }
    
    // Специальная проверка для глаголов с вариантами (например, "got/gotten", "was/were")
    function isMatchingWithVariants(correctAnswerRaw, userAnswerRaw) {
        if (!userAnswerRaw) return false;
        const normalizedUser = normalizeAnswer(userAnswerRaw);
        // разделяем возможные варианты правильного ответа (если содержит слеш или " or " но в основном разделим по '/')
        let possibleCorrects = [];
        if (correctAnswerRaw.includes('/')) {
            possibleCorrects = correctAnswerRaw.split('/').map(s => normalizeAnswer(s));
        } else if (correctAnswerRaw.includes(',')) {
            possibleCorrects = correctAnswerRaw.split(',').map(s => normalizeAnswer(s));
        } else {
            possibleCorrects = [normalizeAnswer(correctAnswerRaw)];
        }
        // также учесть вариант с "got/gotten" -> оба считаются верными
        return possibleCorrects.some(correctNorm => correctNorm === normalizedUser);
    }
    
    // Обновить интерфейс счётчика и прогресса
    function updateUIStats() {
        scoreCountSpan.textContent = userScore;
        scoreInline.textContent = userScore;
        const total = VERBS_LIST.length;
        totalQuestionsSpan.textContent = total;
        totalCountDisplay.textContent = total;
        const currentNumber = currentVerbIndex + 1;
        currentIndexDisplay.textContent = currentNumber;
    }
    
    // Загрузить текущий глагол на экран, сбросить поля ввода, фидбек, флаг ответа
    function loadCurrentVerb() {
        currentVerbData = VERBS_LIST[currentVerbIndex];
        infinitiveDisplay.textContent = currentVerbData.infinitive;
        // очищаем поля
        pastSimpleInput.value = '';
        pastParticipleInput.value = '';
        // сброс фидбека на нейтральный
        feedbackArea.innerHTML = '📝 Введите Past Simple и Past Participle. Нажмите «Check».';
        feedbackArea.className = 'feedback-message';
        // снимаем флаг ответа (текущий вопрос ещё не отвечен правильно)
        isCurrentVerbAnswered = false;
        // дополнительно убираем любые стили / сообщения ошибок
        updateUIStats();
    }
    
    // Проверка ответа (вызывается по кнопке Check)
    function checkAnswer() {
        // если уже ответили правильно на этот глагол — предупредить
        if (isCurrentVerbAnswered) {
            feedbackArea.innerHTML = '⚠️ Вы уже правильно ответили на этот глагол! Нажмите "Next verb" для продолжения.';
            feedbackArea.className = 'feedback-message feedback-red';
            return;
        }
        
        const userPast = pastSimpleInput.value.trim();
        const userParticiple = pastParticipleInput.value.trim();
        
        if (userPast === '' || userParticiple === '') {
            feedbackArea.innerHTML = '❌ Пожалуйста, заполните оба поля: Past Simple и Past Participle.';
            feedbackArea.className = 'feedback-message feedback-red';
            return;
        }
        
        const correctPastRaw = currentVerbData.past;
        const correctParticipleRaw = currentVerbData.participle;
        
        const isPastCorrect = isMatchingWithVariants(correctPastRaw, userPast);
        const isParticipleCorrect = isMatchingWithVariants(correctParticipleRaw, userParticiple);
        
        if (isPastCorrect && isParticipleCorrect) {
            // ---- ПРАВИЛЬНЫЙ ОТВЕТ ----
            if (!isCurrentVerbAnswered) {
                // увеличиваем счёт только если этот глагол ещё не засчитан
                userScore++;
                isCurrentVerbAnswered = true;
                updateUIStats();
                feedbackArea.innerHTML = `🎉 Perfect! «${currentVerbData.infinitive}» → ${correctPastRaw} / ${correctParticipleRaw}. +1 балл!`;
                feedbackArea.className = 'feedback-message feedback-green';
                // можно также заблокировать повторные проверки путём флага
            } else {
                // по логике сюда не попадём, но на всякий случай
                feedbackArea.innerHTML = `✓ Уже засчитано! Правильно: ${correctPastRaw} / ${correctParticipleRaw}`;
                feedbackArea.className = 'feedback-message feedback-green';
            }
        } else {
            // ---- НЕПРАВИЛЬНЫЙ ОТВЕТ ----
            let errorMsg = `❌ Неправильно. `;
            if (!isPastCorrect && !isParticipleCorrect) {
                errorMsg += `Обе формы неверны. Правильно: Past Simple = ${correctPastRaw}, Past Participle = ${correctParticipleRaw}.`;
            } else if (!isPastCorrect) {
                errorMsg += `Past Simple неверно (вы ввели "${userPast}"). Правильно: ${correctPastRaw}. Past Participle — верно!`;
            } else {
                errorMsg += `Past Participle неверно (вы ввели "${userParticiple}"). Правильно: ${correctParticipleRaw}. Past Simple — верно!`;
            }
            feedbackArea.innerHTML = errorMsg;
            feedbackArea.className = 'feedback-message feedback-red';
            // не увеличиваем счёт, флаг остаётся false
        }
    }
    
    // Переход к следующему глаголу
    function nextVerb() {
        // проверяем, достигнут ли конец списка
        if (currentVerbIndex + 1 >= VERBS_LIST.length) {
            // если мы на последнем глаголе и пользователь нажимает next, показываем завершение
            if (!isCurrentVerbAnswered) {
                feedbackArea.innerHTML = '🏁 Это последний глагол! Дайте правильный ответ или нажмите «Reset quiz» для новой попытки.';
                feedbackArea.className = 'feedback-message feedback-red';
                return;
            } else {
                // уже всё ответил, но больше нет слов
                feedbackArea.innerHTML = '✨ Поздравляем! Вы прошли все глаголы! Нажмите «Reset quiz», чтобы начать заново. ✨';
                feedbackArea.className = 'feedback-message feedback-green';
                return;
            }
        }
        
        // переходим к следующему индексу
        currentVerbIndex++;
        loadCurrentVerb();   // загружает новый глагол, сбрасывает флаг, счётчик не трогает (оставляет накопленный)
        // дополнительно, если надо почистить стили – уже сделано
        // убедимся, что счётчик отображается корректно
        updateUIStats();
    }
    
    // Полный сброс викторины (обнуляет счёт, возвращается к первому глаголу)
    function resetQuiz() {
        currentVerbIndex = 0;
        userScore = 0;
        isCurrentVerbAnswered = false;
        loadCurrentVerb();   // загружает первый глагол и чистит поля, сбрасывает флаг
        updateUIStats();
        feedbackArea.innerHTML = '🔄 Викторина сброшена. Начните заново!';
        feedbackArea.className = 'feedback-message';
        // очистка полей дополнительно (load уже чистит)
    }
    
    // Инициализация викторины: загружаем случайный порядок? Нет, оставим линейный порядок (но можно было бы перемешать, 
    // однако лучше стабильная база, чтобы пользователи учились. Можно перемешать при желании, но фикс задание)
    // По требованию "счётчик правильных ответов" глобальный, не сбрасывается при next. Добавим дополнительную проверку, чтобы нельзя было нажать Check повторно и накрутить баллы.
    
    // Дополнительно: при нажатии Enter в любом поле можно вызывать проверку
    function setupEnterHandlers() {
        pastSimpleInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
        pastParticipleInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
    }
    
    // Для красоты, если пользователь уже ответил на вопрос правильно, кнопка Check может не накручивать.
    // Но наша логика с флагом уже это предотвращает.
    
    // дополнительная функция: если мы переходим к следующему глаголу, и текущий не отвечен — разрешаем перейти без штрафа.
    // но по логике пользователь может пропустить слово, счёт не теряется, что корректно и удобно.
    // Так и оставим – можно пропускать неправильные без штрафа.
    
    // Инициализация событий
    function bindEvents() {
        checkBtn.addEventListener('click', checkAnswer);
        nextBtn.addEventListener('click', nextVerb);
        resetBtn.addEventListener('click', resetQuiz);
    }
    
    // Запуск приложения
    function init() {
        bindEvents();
        setupEnterHandlers();
        // установка общего количества
        updateUIStats();
        // загрузить первый глагол
        currentVerbIndex = 0;
        userScore = 0;
        isCurrentVerbAnswered = false;
        loadCurrentVerb();
        updateUIStats();
    }
    
    init();
</script>
</body>
</html>
